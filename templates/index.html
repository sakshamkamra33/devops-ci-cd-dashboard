<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevOps Final Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #020617, #0f172a);
    color: white;
}

/* LOGIN */
#login {
    display: flex;
    height: 100vh;
    justify-content: center;
    align-items: center;
}

.login-box {
    background: #1e293b;
    padding: 30px;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

input {
    padding: 10px;
    margin: 10px;
    width: 200px;
    border-radius: 6px;
    border: none;
}

button {
    padding: 10px 20px;
    background: #22c55e;
    border: none;
    cursor: pointer;
    border-radius: 6px;
    color: white;
}

/* DASHBOARD */
#dashboard {
    display: none;
}

.sidebar {
    width: 220px;
    background: #020617;
    height: 100vh;
    position: fixed;
    padding: 20px;
}

.main {
    margin-left: 240px;
    padding: 20px;
}

.cards {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 10px;
    width: 200px;
    transition: 0.3s;
    box-shadow: 0 0 15px rgba(34,197,94,0.2);
}

.card:hover {
    transform: translateY(-5px);
}

.chart, .logs, .timeline {
    margin-top: 30px;
    background: #1e293b;
    padding: 20px;
    border-radius: 10px;
}

.logs {
    height: 150px;
    overflow-y: auto;
    font-family: monospace;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
    <div class="login-box">
        <h2>🔐 DevOps Login</h2>
        <input id="username" placeholder="Username"><br>
        <input id="password" type="password" placeholder="Password"><br>
        <button onclick="enter()">Login</button>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<div class="sidebar">
    <h2>🚀 DevOps</h2>
    <p>Dashboard</p>
    <p>Deployments</p>
    <p>Metrics</p>
    <p>Logs</p>
</div>

<div class="main">

<h2>Final DevOps Dashboard</h2>

<div class="cards">
    <div class="card"><h4>Status</h4><p id="status">Loading...</p></div>
    <div class="card"><h4>Version</h4><p id="version">Loading...</p></div>
    <div class="card"><h4>Uptime</h4><p>99.99%</p></div>
    <div class="card"><h4>Env</h4><p>Production</p></div>
</div>

<div class="chart">
    <h3>API Metrics</h3>
    <canvas id="chart"></canvas>
</div>

<div class="timeline">
    <h3>Deployment Timeline</h3>
    <p>✔ Code pushed</p>
    <p>✔ Tests passed</p>
    <p>✔ Docker built</p>
    <p>✔ Deployed on Render</p>
</div>

<div class="logs" id="logs"></div>

</div>
</div>

<script>

/* 🔐 LOGIN */
async function enter() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (data.token) {
        localStorage.setItem("token", data.token);

        document.getElementById("login").style.display = "none";
        document.getElementById("dashboard").style.display = "block";

        loadData();
        generateLogs();
        startAutoRefresh();   // 🔥 NEW
    } else {
        alert("Invalid credentials");
    }
}

/* 🔑 LOAD DATA */
async function loadData() {
    const token = localStorage.getItem("token");

    const res = await fetch('/status', {
        headers: { 'x-access-token': token }
    });

    const data = await res.json();

    const statusEl = document.getElementById('status');

    if (data.status === "Running") {
        statusEl.innerHTML = "🟢 Running";
        statusEl.style.color = "#22c55e";
    } else {
        statusEl.innerHTML = "🔴 Down";
        statusEl.style.color = "red";
    }

    document.getElementById('version').innerText = data.version || "N/A";

    updateChart(); // 🔥 live update
}

/* 🔄 AUTO REFRESH EVERY 5 SEC */
function startAutoRefresh() {
    setInterval(() => {
        loadData();
    }, 5000);
}

/* 📊 CHART (LIVE) */
let chart;

function createChart() {
    chart = new Chart(document.getElementById('chart'), {
        type: 'line',
        data: {
            labels: [],
            datasets: [{
                label: "Response Time (ms)",
                data: [],
                borderColor: "#22c55e",
                backgroundColor: "rgba(34,197,94,0.2)",
                fill: true,
                tension: 0.4
            }]
        },
        options: {
            plugins: {
                legend: { labels: { color: "white" } }
            },
            scales: {
                x: { ticks: { color: "white" } },
                y: { ticks: { color: "white" } }
            }
        }
    });
}

/* 📈 UPDATE CHART WITH RANDOM REALISTIC DATA */
function updateChart() {
    if (!chart) return;

    const time = new Date().toLocaleTimeString();
    const value = Math.floor(Math.random() * 50) + 70; // simulate API time

    chart.data.labels.push(time);
    chart.data.datasets[0].data.push(value);

    if (chart.data.labels.length > 10) {
        chart.data.labels.shift();
        chart.data.datasets[0].data.shift();
    }

    chart.update();
}

/* 📜 ANIMATED LOGS */
function generateLogs() {
    const logs = document.getElementById("logs");
    const msgs = [
        "🚀 Deploy started...",
        "🧪 Running tests...",
        "🐳 Building Docker image...",
        "📦 Pushing to registry...",
        "☁️ Deploying to Render...",
        "✅ Live in production!"
    ];

    let i = 0;

    setInterval(() => {
        if (i < msgs.length) {
            logs.innerHTML += "<br>" + msgs[i];
            logs.scrollTop = logs.scrollHeight;
            i++;
        }
    }, 1200);
}

/* INIT CHART */
createChart();

</script>

</body>
</html>
